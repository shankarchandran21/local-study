apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongo-express
  labels:
    app: mongo-express
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongo-express
  template:
    metadata:
      labels:
        app: mongo-express
    spec:
      containers:
      - name: mongo-express
        image: mongo-express
        ports:
        - containerPort: 8081
        env:
        - name: ME_CONFIG_MONGODB_ADMINUSERNAME
          valueFrom:
            secretKeyRef:
              name: mongodb-secret
              key: mongo-root-username
        - name: ME_CONFIG_MONGODB_ADMINPASSWORD
          valueFrom: 
            secretKeyRef:
              name: mongodb-secret
              key: mongo-root-password
        - name: ME_CONFIG_MONGODB_SERVER
          valueFrom: 
            configMapKeyRef:
              name: mongodb-configmap
              key: database_url
---
apiVersion: v1
kind: Service
metadata:
  name: mongo-express-service
spec:
# if is use clusterIp there is no need to use type and nodeport
  # clusterIP: none
  selector:
    app: mongo-express
  type: LoadBalancer  
  ports:
    - protocol: TCP
      port: 8081
      targetPort: 8081
      nodePort: 30000 

# 1. ClusterIP (default)

    # Only accessible inside the cluster.

    # Used for internal communication between pods.

    # No external access.

# 2. NodePort

    # Exposes the service on a port of the Kubernetes node (e.g., http://<NodeIP>:30000).

    # Accessible from outside only if you hit the Node IP + port.

    # You must specify nodePort: in the service YAML (between 30000–32767).

    # Example use: For development / testing when LoadBalancer is not available.

          # type: NodePort
          # ports:
          #   - port: 8081
          #     targetPort: 8081
          #     nodePort: 30000

